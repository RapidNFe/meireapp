# Deploy Web: flutter build web --release --web-renderer html --tree-shake-icons
name: meire
description: Meire Frontend Foundation (v1.0)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  pocketbase: ^0.22.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  mask_text_input_formatter: ^2.8.0
  shimmer: ^3.0.0
  intl: ^0.20.2
  uuid: ^4.5.3
  dio: ^5.9.2
  printing: ^5.11.1
  pdf: ^3.10.8
  share_plus: ^7.2.1
  lottie: ^3.1.2
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0
  url_launcher: ^6.2.2
  http: ^1.6.0
  file_picker: ^8.1.7
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
