<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Meiri - Inteligência Fiscal para MEI.">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Meiri">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Meiri - Inteligência Fiscal</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #FFFFFF;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }
    .logo {
      width: 180px;
      margin-bottom: 24px;
      animation: pulse 2s infinite ease-in-out;
    }
    .app-name {
      color: #013220;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }
    .loader {
      width: 48px;
      height: 4px;
      background: rgba(204, 139, 0, 0.2);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .loader::after {
      content: '';
      width: 24px;
      height: 4px;
      background: #CC8B00;
      border-radius: 2px;
      position: absolute;
      left: -24px;
      animation: loading 1.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { opacity: 0.6; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.6; transform: scale(0.95); }
    }
    @keyframes loading {
      0% { left: -24px; }
      100% { left: 48px; }
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading-indicator">
    <img src="logo.svg" class="logo" alt="Meiri Logo">
    <div class="app-name">Meiri</div>
    <div class="loader"></div>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
